<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram API Feed</title>
    <style>
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .contenedor-instagram {
            background: white;
            border: 1px solid #dbdbdb;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 3px;
        }
        .header-perfil {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }
        .foto-perfil {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 50px;
            border: 1px solid #dbdbdb;
        }
        .datos-perfil h2 {
            font-size: 28px;
            font-weight: 300;
            margin: 0 0 15px 0;
        }
        .estadisticas {
            display: flex;
            gap: 20px;
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }
        .bio {
            font-weight: 400;
        }
        .bio span {
            font-weight: 600;
            display: block;
        }
        .error {
            color: #ed4956;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="contenedor-instagram">
        <p style="text-align: center;">Cargando perfil de Instagram...</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
